# claude-bakeoff configuration
# A/B testing for Claude across instruction recipes AND platforms

# Default recipes to compare
env_a: baseline
env_b: experimental

# Default platforms (cli | discord)
# Each side of a bake can run on a different platform
platform_a: cli
platform_b: cli

# Claude CLI settings (used by cli platform)
claude_bin: claude
claude_model: ""  # empty = use default
claude_max_turns: 10

# Discord platform settings
# Secrets loaded from ~/.config/claude-bakeoff/.env (not committed)
# See .env.example for required variables
discord_timeout: 300       # seconds to wait for bot response

# Evaluation
eval_method: llm-judge        # llm-judge | diff | both
judge_model: ""               # empty = use same claude CLI
judge_criteria:
  - correctness
  - completeness
  - code_quality
  - adherence_to_instructions

# Output
runs_dir: runs
evaluations_dir: evaluations
output_folder: true            # save structured results to bakeoff-<taskname>/ after judging
